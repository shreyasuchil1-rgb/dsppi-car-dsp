devices:
  samplerate: 48000
  chunksize: 1024
  target_level: 2048
  adjust_period: 10
  enable_rate_adjust: true
  capture:
    type: Alsa
    channels: 2
    device: "hw:Loopback,1,0"
    format: S32_LE
  playback:
    type: Alsa
    channels: 8
    device: "hw:sndrpihifiberry"
    format: S32_LE

mixers:
  route_stereo_to_8:
    channels:
      in: 2
      out: 8
    mapping:
      - dest: 0
        sources:
          - channel: 0
      - dest: 1
        sources:
          - channel: 1
      - dest: 2
        sources:
          - channel: 0
      - dest: 3
        sources:
          - channel: 1
      - dest: 4
        sources:
          - channel: 0
      - dest: 5
        sources:
          - channel: 1
      - dest: 6
        sources:
          - channel: 0
      - dest: 7
        sources:
          - channel: 1

filters:
  preamp:
    type: Gain
    parameters:
      gain: -7.0
      inverted: false
      mute: false

  bass_shelf:
    type: Biquad
    parameters:
      type: Lowshelf
      freq: 38
      q: 0.70
      gain: 8.0

  kick:
    type: Biquad
    parameters:
      type: Peaking
      freq: 85
      q: 0.90
      gain: 3.5

  warmth:
    type: Biquad
    parameters:
      type: Peaking
      freq: 180
      q: 1.10
      gain: 1.2

  mud_cut:
    type: Biquad
    parameters:
      type: Peaking
      freq: 320
      q: 1.30
      gain: -2.5

  lower_mids:
    type: Biquad
    parameters:
      type: Peaking
      freq: 900
      q: 1.20
      gain: 1.0

  vocal_presence:
    type: Biquad
    parameters:
      type: Peaking
      freq: 2400
      q: 0.90
      gain: 2.5

  harshness:
    type: Biquad
    parameters:
      type: Peaking
      freq: 4700
      q: 2.00
      gain: -1.5

  sibilance:
    type: Biquad
    parameters:
      type: Peaking
      freq: 8200
      q: 2.20
      gain: -2.5

  air:
    type: Biquad
    parameters:
      type: Highshelf
      freq: 12000
      q: 0.70
      gain: 1.5

  compressor:
    type: Limiter
    parameters:
      soft_clip: true
      clip_limit: -0.5

pipeline:
  - type: Mixer
    name: route_stereo_to_8

  - type: Filter
    channels: [0, 2, 4, 6]
    names:
      - preamp
      - compressor
      - bass_shelf
      - kick
      - warmth
      - mud_cut
      - lower_mids
      - vocal_presence
      - harshness
      - sibilance
      - air

  - type: Filter
    channels: [1, 3, 5, 7]
    names:
      - preamp
      - compressor
      - bass_shelf
      - kick
      - warmth
      - mud_cut
      - lower_mids
      - vocal_presence
      - harshness
      - sibilance
      - air
